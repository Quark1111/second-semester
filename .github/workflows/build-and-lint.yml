name: Build and Lint

on:
  - push
  - pull_request

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup checkout
        uses: actions/checkout@v5

      - name: Build project
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build

      - name: Run clang-tidy
        run: |
          run-clang-tidy -p=build -checks=-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling

      - name: Run clang-format
        run: |
          clang-format --dry-run ./sources/*/*.{c,h} --style=Webkit --Werror

      - name: Run code tests
        run: |
          ./run_tests.sh
