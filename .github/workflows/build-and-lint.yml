name: C Project CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format clang-tidy
      
    - name: Check Formatting
      run: find src -name '*.[ch]' | xargs clang-format --style=file --dry-run --Werror

    - name: Static Analysis
      run: clang-tidy src/*.c -- -Isrc
