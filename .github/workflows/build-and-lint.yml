name: Build and Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build

      - name: clang-tidy
        run: |
          run-clang-tidy -p=build -checks=-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling

      - name: clang-format
        run: |
          find . -path ./build -prune -o -name '*.[c|h]' -print | xargs clang-format --dry-run --style=Webkit --Werror

      - name: tests
        run: |
          ./run_tests.sh
