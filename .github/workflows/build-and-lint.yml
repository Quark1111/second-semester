name: C Project CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format clang-tidy
      
    - name: Check Formatting
      run: find . -path ./build -prune -o -name '*.[ch]' -print | xargs -r clang-format --style=file --dry-run --Werror

    - name: Static Analysis
      run: |
        clang-tidy csv/src/*.c -- -Icsv/src
        clang-tidy avl_tree/src/*.c -- -Iavl_tree/src
        clang-tidy DFA/src/*.c -- -IDFA/src
